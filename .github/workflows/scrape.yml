name: 🎓 Scrape University Summer 2026 Courses

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape Course Data
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚙️ Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Install dependencies
        run: |
          npm install puppeteer cheerio axios
          echo "✅ Dependencies installed"

      - name: 🌐 Install Chromium system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser libnss3 libxss1 libasound2t64 libatk-bridge2.0-0 libgtk-3-0 libgbm-dev --no-install-recommends

      - name: 📁 Prepare data directory
        run: mkdir -p data

      - name: 🔍 Scrape university courses
        run: node scraper.js
        timeout-minutes: 50
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
          NODE_ENV: production

      - name: 📊 Show scraping summary
        run: |
          if [ -f data/index.json ]; then
            echo "=== SCRAPING SUMMARY ==="
            cat data/index.json
          fi

      - name: 💾 Commit scraped data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📚 Update Summer 2026 course data - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
