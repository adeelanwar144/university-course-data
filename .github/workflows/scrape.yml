name: Scrape University Summer 2026 Courses

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape Course Data
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer cheerio axios

      - name: Install Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser --no-install-recommends

      - name: Create data directory
        run: mkdir -p data

      - name: Run scraper
        run: node scraper.js
        timeout-minutes: 50
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update course data $(date -u '+%Y-%m-%d')" && git push
