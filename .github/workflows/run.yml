name: Scrape Courses

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install axios

      - run: mkdir -p data

      - run: node scraper.js

      - name: Push data
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "update data" && git push --force-with-lease)
